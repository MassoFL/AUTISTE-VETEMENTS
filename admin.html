<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Autiste Vêtements</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Admin Panel - Autiste Vêtements</h1>
            <button id="logoutBtn" class="logout-btn">Fermer</button>
        </header>

        <div class="admin-content">
            <div class="form-section">
                <h2>Créer un nouveau post</h2>
                <form id="postForm">
                    <div class="form-group">
                        <label for="productName">Nom du produit</label>
                        <input type="text" id="productName" required>
                    </div>

                    <div class="form-group">
                        <label for="price">Prix (€)</label>
                        <input type="number" id="price" required>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (séparés par des espaces)</label>
                        <input type="text" id="tags" placeholder="hoodie vêtement confort">
                    </div>

                    <div class="form-group">
                        <label for="productType">Type de produit</label>
                        <select id="productType">
                            <option value="vêtement">Vêtement</option>
                            <option value="poster">Poster</option>
                            <option value="print">Print</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Images</label>
                        <div id="imageInputs">
                            <input type="file" class="image-file" accept="image/*" multiple>
                        </div>
                        <div id="imagePreview" class="image-preview"></div>
                        <div id="uploadProgress" style="display: none; margin-top: 10px; color: #4CAF50;"></div>
                    </div>

                    <div class="form-group">
                        <label>Assigner les couleurs aux images</label>
                        <div id="colorImageAssignment"></div>
                    </div>

                    <div class="form-group">
                        <label for="stripeLink">Lien de paiement Stripe (optionnel)</label>
                        <input type="url" id="stripeLink" placeholder="https://buy.stripe.com/...">
                        <small style="color: #888; font-size: 0.85rem; display: block; margin-top: 5px;">
                            Créez un Payment Link dans Stripe et collez-le ici
                        </small>
                    </div>

                    <button type="submit" class="submit-btn">Créer le post</button>
                </form>
            </div>

            <div class="sidebar">
                <div class="posts-section">
                    <h2>Posts existants</h2>
                    <div id="postsList"></div>
                </div>

                <div class="colors-section">
                    <h2>Gérer les couleurs</h2>
                    <form id="colorForm">
                        <div class="form-group">
                            <label for="colorName">Nom de la couleur</label>
                            <input type="text" id="colorName" placeholder="ex: Noir" required>
                        </div>
                        <div class="form-group">
                            <label for="colorHex">Code couleur</label>
                            <input type="color" id="colorHex" required>
                        </div>
                        <button type="submit" class="secondary-btn" style="width: 100%;">Ajouter couleur</button>
                    </form>
                    <div id="colorsList" style="margin-top: 20px;"></div>
                </div>

                <div class="orders-section">
                    <h2>Commandes récentes</h2>
                    <div id="ordersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
    <script src="admin-colors.js"></script>
    <script src="admin-orders.js"></script>
    <script src="admin-assignment.js"></script>
    <script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande Confirmée - Autiste Vêtements</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }
        
        .success-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: bounce 1s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .success-title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 20px;
        }
        
        .success-text {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 40px;
            max-width: 500px;
        }
        
        .success-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .success-btn:hover {
            background: #ddd;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1 class="success-title">Commande Confirmée!</h1>
        <p class="success-text">
            Merci pour votre commande. Vous recevrez un email de confirmation avec les détails de votre achat.
        </p>
        <a href="/" class="success-btn">Retour à la boutique</a>
    </div>
</body>
</html>
